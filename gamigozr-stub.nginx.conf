# HTTP stub for Fiesta's GamigoZR "zone response service".
#
# Real GamigoZR.exe (Gamigo_Zone_Response_Service) is a tiny 15 KB .NET
# service that listens on 127.0.0.1:58492 and answers every HTTP GET
# with the same static blob -- a region-tagged header followed by ~41
# lines of hex tokens that Zone.exe parses at startup. The endpoint is
# documented as `/GR.php` but the server ignores the URL and query
# string entirely; any path produces the same response.
#
# nginx serving a single static file at any path is a drop-in
# replacement. The crypt blob itself is operator-owned and lives in a
# read-only bind mount at /etc/gamigozr/response.txt -- this image
# ships no GamigoZR data, BYO.

server {
    listen      58492 default_server;
    listen [::]:58492 default_server;

    root         /etc/gamigozr;
    default_type "";          # GamigoZR sets no Content-Type; mirror that
    server_tokens off;

    # Any URL -> /response.txt. `break` skips further rewrites so the
    # static-file handler picks up the file from `root` directly.
    location / {
        rewrite ^ /response.txt break;
    }

    # If the operator forgot to mount the blob, fail fast and loud
    # rather than serving an empty body that would silently desync Zone.
    location = /response.txt {
        try_files $uri =502;
    }
}
