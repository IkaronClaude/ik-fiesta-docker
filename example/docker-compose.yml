# Full Fiesta server stack -- uses fiesta-server-runtime against a raw
# ServerSource-shaped tree without modifying it.
#
# Required environment (e.g. via .env file next to this docker-compose.yml):
#   FIESTA_SERVER=/path/to/your/Server     (top of the tree with 9Data/, Login/, ...)
#   SA_PASSWORD=YourStrongPassword1
#
# Optional:
#   PUBLIC_IP=your.public.ip               (only needed for external clients)
#
# What this brings up:
#   sqlserver   -- Microsoft SQL Server 2022 (Linux image)
#   account / accountlog / character / gamelog  -- DB bridge processes
#   login       -- Login service
#   worldmanager -- WM
#   zone00..zone04 -- map zones
#   gamigozr    -- shared anti-cheat HTTP service
#
# All game services share the host's network namespace, so 127.0.0.1 + the
# ports baked into the default ServerInfo.txt Just Work. The only rewrites the
# runtime image performs against your ServerSource are:
#   * ODBC SERVER=.\SQLEXPRESS   -> SERVER=127.0.0.1,1433
#   * ODBC PWD=<hardcoded>       -> PWD=${SA_PASSWORD}
#   * (if PUBLIC_IP is set) SERVER_INFO rows tagged "; PUBLIC_IP" get rewritten
#
# Each container also self-seeds its per-container 9Data/ServerInfo overlay
# on first start (from /source:ro, a second read-only mount of the same
# server folder). No init container required -- works the same way in k8s.

x-fiesta-env: &fiesta-env
  SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD not set. Put it in a .env file.}"
  SQL_HOST: "127.0.0.1"
  SQL_PORT: "${SQL_PORT:-1433}"
  PUBLIC_IP: "${PUBLIC_IP:-}"
  KEEP_ALIVE: "${KEEP_ALIVE:-0}"

x-fiesta: &fiesta
  image: fiesta-server-runtime:latest
  restart: on-failure
  network_mode: host

services:
  sqlserver:
    image: fiesta-sql-runtime:latest
    restart: on-failure
    network_mode: host
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD not set}"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD not set}"
    volumes:
      # Named volume -- survives container destruction, recreate, image
      # rebuild, `docker compose down` (no -v), and `docker compose rm`.
      # The ONLY commands that delete it are:
      #   docker compose down -v     # nukes named volumes too
      #   docker volume rm fiesta-docker-example_sql-data
      # See README.md "What happens on `docker compose down`?" for details.
      - sql-data:/var/opt/mssql
      - ${FIESTA_SERVER:?FIESTA_SERVER not set. Put it in a .env file.}/Databases:/var/opt/mssql/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- Shared anti-cheat / zone-response HTTP service ---
  # Two flavours; pick one. Default is the real .NET GamigoZR.exe under
  # the runtime image (Wine on Linux, native on Windows). The lighter
  # alternative is `fiesta-gamigozr-stub`, an nginx serving a single
  # pre-extracted crypt blob -- see the `gamigozr-stub` block below.
  gamigozr:
    <<: *fiesta
    profiles: ["", "real-gamigozr"]
    command: ["GamigoZR/GamigoZR.exe"]
    environment:
      <<: *fiesta-env
      START_GAMIGOZR: "0"
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/gamigozr:/fiesta/9Data/ServerInfo

  # Opt in with: `docker compose --profile gamigozr-stub up -d`.
  # Requires a one-time blob extraction from real GamigoZR:
  #   1. Run the real `gamigozr` service once (above), or run
  #      GamigoZR.exe on a Windows host directly.
  #   2. `curl http://127.0.0.1:58492/ > gamigozr-response.txt`
  #   3. Place gamigozr-response.txt next to this compose file.
  # The stub then serves that exact blob on every request -- byte-
  # identical to real GamigoZR, no Wine, ~10 MB image.
  gamigozr-stub:
    image: fiesta-gamigozr-stub:latest
    profiles: ["gamigozr-stub"]
    restart: on-failure
    network_mode: host
    volumes:
      - ./gamigozr-response.txt:/etc/gamigozr/response.txt:ro

  # --- DB bridge processes ---
  account:
    <<: *fiesta
    command: ["Account/Account.exe"]
    environment:
      <<: *fiesta-env
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/account:/fiesta/9Data/ServerInfo
    depends_on:
      sqlserver:
        condition: service_healthy

  accountlog:
    <<: *fiesta
    command: ["AccountLog/AccountLog.exe"]
    environment:
      <<: *fiesta-env
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/accountlog:/fiesta/9Data/ServerInfo
    depends_on:
      sqlserver:
        condition: service_healthy

  character:
    <<: *fiesta
    command: ["Character/Character.exe"]
    environment:
      <<: *fiesta-env
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/character:/fiesta/9Data/ServerInfo
    depends_on:
      sqlserver:
        condition: service_healthy

  gamelog:
    <<: *fiesta
    command: ["GameLog/GameLog.exe"]
    environment:
      <<: *fiesta-env
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/gamelog:/fiesta/9Data/ServerInfo
    depends_on:
      sqlserver:
        condition: service_healthy

  # --- Game processes ---
  login:
    <<: *fiesta
    command: ["Login/Login.exe"]
    environment:
      <<: *fiesta-env
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/login:/fiesta/9Data/ServerInfo
    depends_on:
      account:
        condition: service_started
      accountlog:
        condition: service_started
      character:
        condition: service_started
      gamelog:
        condition: service_started

  worldmanager:
    <<: *fiesta
    command: ["WorldManager/WorldManager.exe"]
    environment:
      <<: *fiesta-env
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/worldmanager:/fiesta/9Data/ServerInfo
    depends_on:
      account:
        condition: service_started
      accountlog:
        condition: service_started
      character:
        condition: service_started
      gamelog:
        condition: service_started

  # --- Zones (depend on WorldManager + GamigoZR) ---
  zone00:
    <<: *fiesta
    command: ["Zone00/Zone.exe"]
    environment:
      <<: *fiesta-env
      START_GAMIGOZR: "0"
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/zone00:/fiesta/9Data/ServerInfo
    depends_on:
      worldmanager:
        condition: service_started
      gamigozr:
        condition: service_started

  zone01:
    <<: *fiesta
    command: ["Zone01/Zone.exe"]
    environment:
      <<: *fiesta-env
      START_GAMIGOZR: "0"
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/zone01:/fiesta/9Data/ServerInfo
    depends_on:
      worldmanager:
        condition: service_started
      gamigozr:
        condition: service_started

  zone02:
    <<: *fiesta
    command: ["Zone02/Zone.exe"]
    environment:
      <<: *fiesta-env
      START_GAMIGOZR: "0"
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/zone02:/fiesta/9Data/ServerInfo
    depends_on:
      worldmanager:
        condition: service_started
      gamigozr:
        condition: service_started

  zone03:
    <<: *fiesta
    command: ["Zone03/Zone.exe"]
    environment:
      <<: *fiesta-env
      START_GAMIGOZR: "0"
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/zone03:/fiesta/9Data/ServerInfo
    depends_on:
      worldmanager:
        condition: service_started
      gamigozr:
        condition: service_started

  zone04:
    <<: *fiesta
    command: ["Zone04/Zone.exe"]
    environment:
      <<: *fiesta-env
      START_GAMIGOZR: "0"
    volumes:
      - ${FIESTA_SERVER:?}:/fiesta
      - ${FIESTA_SERVER:?}:/source:ro
      - ./serverinfo/zone04:/fiesta/9Data/ServerInfo
    depends_on:
      worldmanager:
        condition: service_started
      gamigozr:
        condition: service_started

volumes:
  # DB data lives in a Docker-managed named volume. It survives container
  # destruction, recreation, image rebuilds, and plain `docker compose down`.
  # See README.md "What happens on `docker compose down`?" for the full
  # matrix of what does and does not delete this data.
  sql-data:
