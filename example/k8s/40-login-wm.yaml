---
apiVersion: v1
kind: Service
metadata: { name: worldmanager, namespace: fiesta, labels: { app: worldmanager, tier: game } }
spec: { clusterIP: None, selector: { app: worldmanager }, ports: [{ name: client, port: 9013, targetPort: 9013 }] }
